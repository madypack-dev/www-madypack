<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <rect width="200" height="200" rx="16" fill="#f8f9fa"/>
  <!-- Valve body drawing -->
  <g transform="translate(25, 25)" stroke="#2a5298" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Main pipe horizontal -->
    <line x1="20" y1="100" x2="130" y2="100"/>
    <!-- Connection flanges -->
    <line x1="20" y1="80" x2="20" y2="120"/>
    <line x1="130" y1="80" x2="130" y2="120"/>
    <!-- Valve bonnet / central vertical body -->
    <path d="M75,100 L75,50"/>
    <!-- Handle / Wheel -->
    <ellipse cx="75" cy="40" rx="30" ry="10" fill="#ff7f50" stroke="#ff7f50"/>
    <!-- Flow arrow indicator -->
    <path d="M50,130 L100,130 M90,120 L100,130 L90,140" stroke="#6c757d" stroke-width="4"/>
  </g>
</svg>
