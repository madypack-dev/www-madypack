<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <rect width="200" height="200" rx="16" fill="#f8f9fa"/>
  <!-- Robinet knob drawing -->
  <g transform="translate(25, 25)" stroke="#2a5298" stroke-width="8" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- Outer control dial ring -->
    <circle cx="75" cy="75" r="50"/>
    <!-- Graduations -->
    <line x1="75" y1="25" x2="75" y2="35"/>
    <line x1="125" y1="75" x2="115" y2="75"/>
    <line x1="75" y1="125" x2="75" y2="115"/>
    <line x1="25" y1="75" x2="35" y2="75"/>
    <!-- Center pointer knob -->
    <circle cx="75" cy="75" r="20" fill="#ff7f50" stroke="#ff7f50"/>
    <line x1="75" y1="75" x2="75" y2="45" stroke="#ffffff" stroke-width="6"/>
  </g>
</svg>
