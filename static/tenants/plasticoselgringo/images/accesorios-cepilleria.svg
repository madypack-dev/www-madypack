<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <rect width="200" height="200" rx="16" fill="#faf8f5"/>
  <!-- Wooden block drawing with holes -->
  <g transform="translate(25, 30)" stroke="#a1887f" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Main block -->
    <rect x="20" y="50" width="110" height="40" rx="6" fill="#d7ccc8"/>
    <!-- Holes -->
    <circle cx="45" cy="70" r="4" fill="#5d4037" stroke="none"/>
    <circle cx="75" cy="70" r="4" fill="#5d4037" stroke="none"/>
    <circle cx="105" cy="70" r="4" fill="#5d4037" stroke="none"/>
    <!-- Metallic thread socket -->
    <path d="M75,50 L75,30 M65,30 L85,30" stroke="#78909c" stroke-width="6"/>
  </g>
</svg>
