<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <rect width="200" height="200" rx="16" fill="#f5f5f5"/>
  <!-- PEAD heavy plastic filament bundle drawing -->
  <g transform="translate(30, 25)" stroke="#212121" stroke-width="8" stroke-linecap="round" fill="none">
    <!-- Base belt/atado strap -->
    <rect x="25" y="70" width="90" height="15" rx="4" fill="#cfd8dc" stroke="#90a4ae" stroke-width="4"/>
    <!-- Individual bristles vertical -->
    <path d="M30,30 L30,150 M40,30 L40,150 M50,30 L50,150 M60,30 L60,150 M70,30 L70,150 M80,30 L80,150 M90,30 L90,150 M100,30 L100,150 M110,30 L110,150" stroke-width="5"/>
    <!-- Highlight overlapping filaments to show texture -->
    <path d="M28,50 L58,130 M42,40 L92,140 M78,35 L108,125" stroke="#757575" stroke-width="3"/>
  </g>
</svg>
