<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <rect width="200" height="200" rx="16" fill="#f5f7f8"/>
  <!-- Tissue paper roll drawing -->
  <g transform="translate(30, 25)" stroke="#78909c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Spool center -->
    <ellipse cx="70" cy="50" rx="35" ry="15" fill="#eceff1" stroke="#78909c" stroke-width="6"/>
    <ellipse cx="70" cy="50" rx="10" ry="4" fill="#37474f" stroke="#37474f"/>
    <!-- Outer cylinder outline -->
    <path d="M35,50 L35,140 C35,155 105,155 105,140 L105,50"/>
    <!-- Paper sheet waving off -->
    <path d="M105,80 Q125,75 135,100 T145,130 Q145,155 110,160" stroke="#b0bec5" stroke-width="4"/>
  </g>
</svg>
