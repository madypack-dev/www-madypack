<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <rect width="200" height="200" rx="16" fill="#fcf8f2"/>
  <!-- Paper roll drawing -->
  <g transform="translate(30, 25)" stroke="#8d6e63" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Spool center -->
    <ellipse cx="70" cy="50" rx="35" ry="15" fill="#d7ccc8" stroke="#8d6e63" stroke-width="6"/>
    <ellipse cx="70" cy="50" rx="10" ry="4" fill="#5d4037" stroke="#5d4037"/>
    <!-- Outer cylinder outline -->
    <path d="M35,50 L35,140 C35,155 105,155 105,140 L105,50"/>
    <!-- Paper sheet coming off -->
    <path d="M105,80 C130,80 145,100 140,130 C135,155 90,165 60,160" stroke="#b0bec5" stroke-width="5"/>
  </g>
</svg>
