{% from "macros/social.html" import social_icon, social_url %}

<footer class="site-footer">
    <div class="footer-top">
        <div class="container">
            <a href="{{ site.site.logo.url }}" class="footer-logo" rel="home">
                <img src="{{ url_for('static', path='images/' ~ site.footer.logo.src) }}"
                     width="{{ site.site.logo.width }}"
                     height="{{ site.site.logo.height }}"
                     alt="{{ site.site.logo.alt }}"
                     decoding="async">
            </a>

            <nav class="footer-nav" aria-label="Footer">
                <ul>
                    {% for item in site.footer.menu %}
                    <li>
                        <a href="{{ item.url }}"{% if item.rel %} rel="{{ item.rel }}"{% endif %}>{{ item.label }}</a>
                    </li>
                    {% endfor %}
                </ul>
            </nav>

            <ul class="footer-socials social-links">
                {% for social in site.socials %}
                <li>
                    <a href="{{ social_url(social, site.whatsapp.phone, site.whatsapp.message) }}"
                       aria-label="{{ social.label }}"
                       target="_blank"
                       rel="noopener noreferrer"
                       {% if social.cta_class %}class="{{ social.cta_class }}" data-click-id="{{ social.network }}-cta"{% endif %}>
                        {{ social_icon(social.network, 20, 20) }}
                    </a>
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</footer>
