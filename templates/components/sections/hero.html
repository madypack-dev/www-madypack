<section class="hero">
    <div class="hero-slides">
        <div class="hero-slide active hero-slide-1"></div>
        <div class="hero-slide hero-slide-2"></div>
    </div>

    <!-- Navegación del Carrusel -->
    <button class="hero-arrow hero-arrow-prev" aria-label="Anterior" title="Anterior">&#10094;</button>
    <button class="hero-arrow hero-arrow-next" aria-label="Siguiente" title="Siguiente">&#10095;</button>

    <div class="container">
        <h1>{{ site.home.hero.title }}</h1>
        <p class="hero-subtitle">{{ site.home.hero.subtitle }}</p>
    </div>
</section>
