<meta charset="{{ site.site.charset }}">
<meta name="viewport" content="{{ site.site.viewport }}">
<meta name="robots" content="{{ site.site.robots }}">
<link rel="profile" href="{{ site.site.profile_url }}">

<title>{% block title %}{{ site.site.title_default }}{% endblock %}</title>
<meta name="description" content="{% block meta_description %}{{ site.schema_config.description }}{% endblock %}">

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='/images/favicon.svg') }}">

<!-- Canonical Link -->
<link rel="canonical" href="{{ site.schema_config.url }}{{ request.url.path }}">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:url" content="{{ site.schema_config.url }}{{ request.url.path }}">
<meta property="og:title" content="{% block og_title %}{{ self.title() }}{% endblock %}">
<meta property="og:description" content="{% block og_description %}{{ self.meta_description() }}{% endblock %}">
<meta property="og:image" content="{{ site.schema_config.url }}{{ url_for('static', path='/images/og-image.jpg') }}">

<!-- Twitter -->
<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:url" content="{{ site.schema_config.url }}{{ request.url.path }}">
<meta property="twitter:title" content="{% block twitter_title %}{{ self.title() }}{% endblock %}">
<meta property="twitter:description" content="{% block twitter_description %}{{ self.meta_description() }}{% endblock %}">
<meta property="twitter:image" content="{{ site.schema_config.url }}{{ url_for('static', path='/images/og-image.jpg') }}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@500;600;700&display=swap">

<link rel="stylesheet" href="{{ url_for('static', path='/css/base/variables.css') }}">
<link rel="stylesheet" href="{{ url_for('static', path='/css/base/reset.css') }}">
<link rel="stylesheet" href="{{ url_for('static', path='/css/layout.css') }}">
<link rel="stylesheet" href="{{ url_for('static', path='/css/components/buttons.css') }}">
<link rel="stylesheet" href="{{ url_for('static', path='/css/components/social.css') }}">
<link rel="stylesheet" href="{{ url_for('static', path='/css/components/header.css') }}">
<link rel="stylesheet" href="{{ url_for('static', path='/css/components/footer.css') }}">
<link rel="stylesheet" href="{{ url_for('static', path='/css/components/home.css') }}">
<link rel="stylesheet" href="{{ url_for('static', path='/css/components/cart.css') }}">
<link rel="stylesheet" href="{{ url_for('static', path='/css/components/tienda.css') }}">
<link rel="stylesheet" href="{{ url_for('static', path='/css/components/cookie-banner.css') }}">
<link rel="stylesheet" href="{{ url_for('static', path='/css/components/confirmation.css') }}">
