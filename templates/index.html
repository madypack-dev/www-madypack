<!DOCTYPE html>
<html lang="{{ site.site.lang }}" data-gtm-id="{{ site.analytics.gtm_id }}" data-ga-id="{{ site.analytics.ga_id }}">
<head>
    <meta charset="{{ site.site.charset }}">
    <meta name="viewport" content="{{ site.site.viewport }}">
    <meta name="robots" content="{{ site.site.robots }}">
    <link rel="profile" href="{{ site.site.profile_url }}">

    <title>{{ site.site.title_default }}</title>

    <link rel="stylesheet" href="{{ url_for('static', path='/css/styles.css') }}">
</head>
<body>
    <noscript>
        <iframe src="https://www.googletagmanager.com/ns.html?id={{ site.analytics.gtm_id }}" height="0" width="0" style="display:none;visibility:hidden"></iframe>
    </noscript>
    <header>
        <div class="container">
            <h1>{{ site.header.brand }}</h1>
            <p>{{ site.header.tagline }}</p>
        </div>
    </header>

    <main class="container">
        <h2>{{ site.main.heading }}</h2>
        <p>{{ site.main.body }}</p>
    </main>

    <script src="{{ url_for('static', path='/js/app.js') }}"></script>
</body>
</html>
