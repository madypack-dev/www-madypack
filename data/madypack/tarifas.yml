# data/tarifas.yml
# Conceptos de costo genéricos utilizados por el motor de cálculo de precios.
# Cada artículo del catálogo indica qué conceptos usa y con qué estrategia.
tarifas:
  conceptos:
    base: 0.15                  # Costo base por bolsa (materia prima)
    manija_plana: 0.35          # Adicional por manija plana
    manija_cordon: 0.65         # Adicional por manija de cordón
    personalizacion: 0.20       # Adicional por impresión
    fijo_matriz: 1500.00        # Costo de matriz flexográfica única por pedido
