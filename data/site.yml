  quote_form:
    title: "Pedido de cotización"
    meta_title: "Cotización"
    meta_description: "Solicitá un presupuesto para tus bolsas de papel personalizadas o lisas estándar. Madypack Garín."
    description: "Completá el formulario para que podamos enviarte un presupuesto personalizado."
    submit: "Solicitar cotización"
    success_title: "¡Gracias!"
    success_message: "Tu solicitud de cotización ha sido recibida con éxito. Nos pondremos en contacto a la brevedad."
    required_marker: "*"
    required_abbreviation: "requerido"
    details:
      - title: "Información Importante para tu Presupuesto"
        text: "Para poder brindarte la cotización más precisa y competitiva posible, te sugerimos detallar las especificaciones requeridas de tus bolsas (medidas, tipo de manija, cantidad de colores a imprimir) en el campo de descripción. Si estás buscando bolsas personalizadas, comentanos si contás con el diseño final o si requerís asistencia."
      - title: "¿Cuáles son las opciones de personalización?"
        text: "Podés elegir entre bolsas con manijas (plana o cordón) o sin manijas (tipo SOS / fondo americano). La impresión se realiza en flexografía con tintas al agua ecológicas. Contamos con capacidad para imprimir desde tiradas iniciales medianas hasta grandes volúmenes para cadenas comerciales."
      - title: "Envíos y Retiros"
        text: "Realizamos envíos a todo el país coordinando con expresos y transportadoras de confianza. También podés retirar tu pedido directamente por nuestra planta gráfica ubicada en Garín, Buenos Aires, en los días y horarios acordados con tu asesor comercial."
    fields:
      - name: name
        label: "Nombre y Apellido"
        type: text
        required: false
      - name: email
        label: "Email"
        type: email
        required: true
      - name: phone
        label: "Celular"
        type: text
        required: true
      - name: company
        label: "Empresa"
        type: text
        required: false
      - name: message
        label: "¿Qué tipo de bolsa necesitas?"
        type: textarea
        required: false
        rows: 4
        full_width: true

  about:
    title: "Madypack"
    meta_title: "Quiénes somos – Madypack"
    meta_description: "Conocé Madypack, fábrica de bolsas de papel sustentables gestionada por sus trabajadores de Madygraf Garín."
    text: "En Madypack nos dedicamos a fabricar bolsas de papel kraft y packaging sustentable. Producimos con energía solar y materiales ecológicos, buscando siempre ofrecer productos resistentes, de calidad y respetuosos con el ambiente."
    button_text: "Conocenos"
    button_url: "/quienes-somos/"
    image: "quienes-somos-home-edited.jpg"
    paragraphs:
      - "En Madypack nos dedicamos a fabricar bolsas de papel kraft y packaging sustentable. Producimos con energía solar y materiales ecológicos, buscando siempre ofrecer productos resistentes, de calidad y respetuosos con el ambiente."
      - "Formamos parte de Madygraf, una cooperativa de trabajadores con más de 30 años de experiencia en la industria gráfica. Somos más de 100 personas que compartimos un mismo objetivo: trabajar con compromiso, cuidar cada detalle y generar un impacto positivo en nuestra comunidad."
      - "En cada bolsa que producimos hay mano de obra nacional, esfuerzo colectivo y compromiso con la comunidad. Nos gusta construir relaciones duraderas con nuestros clientes y crecer juntos, cuidando el entorno y promoviendo una producción responsable."
    details:
      - title: "Nuestros Valores y Compromiso Social"
        text: "Como parte de la cooperativa gráfica <strong>Madygraf</strong> (ex-Donnelley), ubicada en Garín, Provincia de Buenos Aires, en <strong>Madypack</strong> no solo fabricamos envases y bolsas de papel sustentables, sino que defendemos la gestión obrera y el trabajo digno. Toda nuestra producción se organiza bajo principios de solidaridad, igualdad y democracia interna."
      - title: "Producción Sustentable y Cuidado Ambiental"
        text: "Estamos plenamente comprometidos con la preservación del medio ambiente. Por ello, nuestras bolsas se elaboran utilizando papel kraft 100% biodegradable y reciclable, proveniente de fuentes responsables certificadas. Empleamos adhesivos a base de almidón natural y tintas al agua no contaminantes, libres de solventes químicos nocivos. Esto garantiza que cada bolsa entregada pueda volver a integrarse a la naturaleza de manera segura, reduciendo la huella de carbono de tu comercio."
      - title: "Soluciones a Medida para Comercios y Empresas"
        text: "Entendemos que el packaging es la carta de presentación de tu marca. Ofrecemos una amplia gama de alternativas adaptables a rubros como gastronomía, indumentaria, eventos, tiendas de regalos y comercios en general. Desde bolsas kraft lisas estándar en diversos tamaños hasta impresiones personalizadas de alta calidad con el logo y colores de tu identidad corporativa, brindamos asesoramiento integral y presupuestos flexibles."

  newsletter:
    title: "Suscribite a nuestro newsletter"
    placeholder: "Ingrese su email"
    submit: "Enviar"
    success_title: "¡Suscrito!"
    success_message: "Te has registrado exitosamente a nuestro newsletter."

  contact:
    title: "Contacto"
    meta_title: "Contacto"
    meta_description: "Contactate con Madypack. Atención al cliente, teléfono, email, WhatsApp y ubicación en Garín, Buenos Aires."
    email: "atencionalcliente@madypack.com.ar"
    whatsapp_label: "5491125794649"
    address: "Ruta Panamericana km 36.7 Garín, Buenos Aires, Argentina."
    map_url: "https://maps.google.com/maps?q=Madygraf&t=&z=12&ie=UTF8&output=embed"
    map_link: "https://maps.app.goo.gl/UMnnhnJHeikihewG6"
    map_title: "Ubicación de Madypack"
    labels:
      customer_service: "Atención al Cliente"
      whatsapp: "WhatsApp:"
      location: "Ubicación"
    details:
      - title: "Atención Comercial y Consultas"
        text: "Nuestro equipo de atención al cliente y soporte comercial está disponible para asesorarte de lunes a viernes en el horario de 08:00 a 17:00 hs. Podés enviarnos un correo electrónico directo, comunicarte a nuestro canal de WhatsApp para respuestas rápidas, o completar el formulario de cotización si ya tenés claro lo que necesitás."
      - title: "¿Cómo llegar a la planta?"
        text: "La fábrica cooperativa se encuentra ubicada estratégicamente sobre la colectora de la Ruta Panamericana km 36.7, en la localidad de Garín, Partido de Escobar, Buenos Aires. El acceso vehicular es sumamente directo desde la autopista, facilitando las tareas de carga y logística de mercadería."
      - title: "Atención Cooperativa Directa"
        text: "Al contactar con Madypack, estás dialogando de forma directa con los trabajadores de la cooperativa. Al eliminar intermediarios innecesarios, aseguramos una comunicación transparente, un control estricto sobre los procesos de confección y los precios más justos del mercado."

